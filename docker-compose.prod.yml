version: '3.8'

services:
  frontend:
    image: ${DOCKER_REGISTRY:-}alumni-connect-frontend:${VERSION:-latest}
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - alumni-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  backend:
    image: ${DOCKER_REGISTRY:-}alumni-connect-backend:${VERSION:-latest}
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
    volumes:
      - backend-logs:/app/logs
    networks:
      - alumni-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

volumes:
  backend-logs:

networks:
  alumni-network:
    driver: bridge
